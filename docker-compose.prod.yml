# Production. Runs on the external `webnet` network so it reaches the litellm
# container directly by name (http://litellm:4000). NPM (npm-app-1) is also on `webnet`, so it proxies the
# public domain to this container by name. No host ports are published.
#
# Run:  docker compose -f docker-compose.prod.yml up -d --build
services:
  llm-api-gateway:
    build: .
    image: llm-api-gateway:latest
    container_name: llm-api-gateway
    restart: unless-stopped
    env_file: .env.local
    environment:
      - LITELLM_BASE_URL=http://litellm:4000/v1
    expose:
      - "8787"
    networks:
      - webnet

networks:
  webnet:
    external: true
