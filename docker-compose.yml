# Local run. Joins the same external `webnet` network as the litellm container
#
# Prereq: the litellm container is running and an external webnet docker network is created.
# If not: `docker network create webnet`.
#
# Run:  docker compose up --build
services:
  llm-api-gateway:
    build: .
    image: llm-api-gateway:latest
    container_name: llm-api-gateway
    env_file: .env.local
    environment:
      - LITELLM_BASE_URL=http://litellm:4000/v1
    ports:
      - "8787:8787"
    networks:
      - webnet

networks:
  webnet:
    external: true
